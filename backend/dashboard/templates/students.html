{% extends "base.html" %}

{% block title %}Students — Bangko ng Seton{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="mb-1"><i class="bi bi-people me-2"></i>Student Management</h2>
        <p class="text-muted mb-0">Search and view all registered students</p>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <!-- Search Bar -->
        <div class="row mb-3">
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control" id="searchInput" placeholder="Search by name or ID...">
                </div>
            </div>
        </div>

        <!-- Students Table -->
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Student ID</th>
                        <th>Name</th>
                        <th>ID Card</th>
                        <th>Money Card</th>
                        <th>Balance</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="studentsTable">
                    <tr>
                        <td colspan="6" class="text-center text-muted py-4">
                            <div class="spinner-border spinner-border-sm me-2"></div>Loading students...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        loadStudents();
        document.getElementById('searchInput').addEventListener('input', searchStudents);
    });

    async function loadStudents() {
        try {
            const response = await fetch('/api/students');
            const data = await response.json();
            displayStudents(data.students);
        } catch (error) {
            console.error('Error loading students:', error);
            document.getElementById('studentsTable').innerHTML =
                '<tr><td colspan="6" class="text-center text-danger py-3">Failed to load students</td></tr>';
        }
    }

    function displayStudents(students) {
        const tbody = document.getElementById('studentsTable');

        if (!students || students.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No students found</td></tr>';
            return;
        }

        tbody.innerHTML = students.map(s => `
            <tr>
                <td>${s.StudentID}</td>
                <td><strong>${s.Name}</strong></td>
                <td><code class="small">${s.IDCardNumber || '—'}</code></td>
                <td><code class="small">${s.MoneyCardNumber || '—'}</code></td>
                <td>₱${(parseFloat(s.Balance) || 0).toFixed(2)}</td>
                <td><span class="badge ${s.Status === 'Active' ? 'bg-success' : 'bg-secondary'}">${s.Status || 'Active'}</span></td>
            </tr>
        `).join('');
    }

    async function searchStudents() {
        const query = document.getElementById('searchInput').value;
        try {
            const response = await fetch(`/api/students/search?q=${encodeURIComponent(query)}`);
            const data = await response.json();
            displayStudents(data.students);
        } catch (error) {
            console.error('Error searching:', error);
        }
    }
</script>
{% endblock %}
