<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parent Portal — BankongSeton</title>
  <!-- Bootstrap 5 CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body { background-color: #f8f9fa; }
    .balance-amount { font-size: 2.5rem; font-weight: 700; }
    .card { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .table-sm td, .table-sm th { font-size: 0.875rem; }
    .top-bar { border-bottom: 1px solid #dee2e6; padding-bottom: 1rem; margin-bottom: 1.5rem; }
  </style>
</head>
<body class="bg-light">
  <div class="container py-4" style="max-width: 720px;">

    <!-- Top bar -->
    <div class="d-flex align-items-center justify-content-between top-bar">
      <div>
        <h4 class="mb-0 fw-semibold">
          <i class="bi bi-bank me-2 text-primary"></i>BankongSeton
          <span class="text-muted fw-normal">— Parent Portal</span>
        </h4>
      </div>
      <form method="POST" action="/parent/logout">
        <button type="submit" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
      </form>
    </div>

    <!-- Error banner (hidden by default) -->
    <div id="error-banner" class="alert alert-danger" style="display:none;">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <span id="error-message">Unable to load data. Please refresh and try again.</span>
    </div>

    <!-- Balance card -->
    <div class="card mb-4">
      <div class="card-body">
        <div class="d-flex align-items-start justify-content-between mb-2">
          <div>
            <h5 class="card-title mb-0" id="student-name">
              <span class="placeholder-wave"><span class="placeholder col-6"></span></span>
            </h5>
            <small class="text-muted" id="student-id">
              <span class="placeholder-wave"><span class="placeholder col-4"></span></span>
            </small>
          </div>
          <span class="badge bg-primary-subtle text-primary border border-primary-subtle">Student</span>
        </div>
        <hr class="my-3" />
        <div class="text-center">
          <div class="text-muted small mb-1">Current Balance</div>
          <div class="balance-amount text-success" id="balance">
            <span class="placeholder-wave"><span class="placeholder col-4"></span></span>
          </div>
          <div class="text-muted small mt-2">
            Spent this month:
            <strong id="monthly-spend">
              <span class="placeholder-wave"><span class="placeholder col-3"></span></span>
            </strong>
          </div>
        </div>
      </div>
    </div>

    <!-- Transaction history card -->
    <div class="card">
      <div class="card-header bg-white d-flex align-items-center">
        <i class="bi bi-clock-history me-2 text-secondary"></i>
        <span class="fw-semibold">Transaction History</span>
        <span class="text-muted small ms-auto">newest first</span>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover table-sm mb-0">
            <thead class="table-light">
              <tr>
                <th class="ps-3">Date</th>
                <th>Description</th>
                <th class="text-end pe-3">Amount</th>
              </tr>
            </thead>
            <tbody id="txn-body">
              <tr>
                <td colspan="3" class="text-center text-muted py-3">
                  <span class="placeholder-wave">
                    <span class="placeholder col-6"></span>
                  </span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="text-center text-muted small mt-4">
      <i class="bi bi-shield-lock me-1"></i>BankongSeton Cashless Canteen System
    </div>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('/api/parent/data')
        .then(r => r.json())
        .then(data => {
          if (data.error) {
            document.getElementById('error-message').textContent = data.error;
            document.getElementById('error-banner').style.display = '';
            return;
          }

          // Populate student info
          document.getElementById('student-name').textContent = data.student_name || '—';
          document.getElementById('student-id').textContent = 'ID: ' + (data.student_id || '—');

          // Populate balance
          const balance = typeof data.balance === 'number' ? data.balance : parseFloat(data.balance) || 0;
          document.getElementById('balance').textContent = '₱' + balance.toFixed(2);

          // Populate monthly spend
          const spend = typeof data.monthly_spend === 'number' ? data.monthly_spend : parseFloat(data.monthly_spend) || 0;
          document.getElementById('monthly-spend').textContent = '₱' + spend.toFixed(2);

          // Render transaction rows
          const tbody = document.getElementById('txn-body');
          tbody.innerHTML = '';
          const txns = data.transactions || [];
          if (txns.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-3">No transactions yet</td></tr>';
            return;
          }
          txns.forEach(t => {
            const amt = parseFloat(t.amount) || 0;
            const amtClass = amt >= 0 ? 'text-success' : 'text-danger';
            const amtSign = amt >= 0 ? '+' : '';
            const amtDisplay = amtSign + '₱' + Math.abs(amt).toFixed(2);
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td class="ps-3 text-nowrap">${t.date || '—'}</td>
              <td>${t.description || '—'}</td>
              <td class="text-end pe-3 fw-semibold ${amtClass}">${amtDisplay}</td>
            `;
            tbody.appendChild(tr);
          });
        })
        .catch(() => {
          document.getElementById('error-message').textContent = 'Network error. Please refresh the page.';
          document.getElementById('error-banner').style.display = '';
          // Clear loading placeholders on error
          document.getElementById('student-name').textContent = '—';
          document.getElementById('student-id').textContent = '—';
          document.getElementById('balance').textContent = '₱0.00';
          document.getElementById('monthly-spend').textContent = '₱0.00';
          document.getElementById('txn-body').innerHTML =
            '<tr><td colspan="3" class="text-center text-danger py-3">Failed to load transactions</td></tr>';
        });
    });
  </script>
</body>
</html>
