<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Bangko ng Seton</title>
    <link rel="stylesheet" href="/static/css/panel.css">
    <style>
        body.login-body {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 1.5rem;
            background:
                radial-gradient(1100px 520px at 15% -10%, #e6e2ff 0%, transparent 55%),
                radial-gradient(900px 480px at 110% 110%, #ded9f7 0%, transparent 50%),
                var(--bg);
        }
        .login-card {
            width: 100%; max-width: 400px; background: var(--surface);
            border: 1px solid rgba(217, 211, 232, 0.85); border-radius: 18px;
            box-shadow: 0 24px 60px rgba(49, 43, 79, 0.14); padding: 2.4rem 2.1rem;
        }
        .login-brand { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0.5rem; margin-bottom: 1.6rem; }
        .login-brand img { width: 64px; height: 64px; object-fit: contain; }
        .login-brand h1 { margin: 0; font-family: 'Instrument Serif', Georgia, serif; font-style: italic; font-size: 1.9rem; color: var(--ink); }
        .login-brand p { margin: 0; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; color: var(--muted); }
        .login-field { margin-bottom: 1rem; }
        .login-field label { display: block; font-size: 0.8rem; font-weight: 700; color: #38364b; margin-bottom: 0.4rem; }
        .login-alert { display: none; align-items: center; gap: 0.5rem; background: #fdeaea; border: 1px solid #f3c5c5; color: var(--err); border-radius: 10px; padding: 0.65rem 0.8rem; font-size: 0.88rem; font-weight: 600; margin-bottom: 1rem; }
        .login-alert.show { display: flex; }
        .login-foot { margin-top: 1.5rem; text-align: center; font-size: 0.78rem; color: var(--muted); }
    </style>
</head>
<body class="panel-body login-body">
    <div class="login-card">
        <div class="login-brand">
            <img src="/static/seton_logo.png" alt="Bangko ng Seton">
            <h1>Bangko ng Seton</h1>
            <p>Financial Intelligence</p>
        </div>

        <form id="loginForm" novalidate>
            <div class="login-field">
                <label for="username">Username</label>
                <input type="text" class="input" id="username" autocomplete="username" placeholder="Enter your username">
            </div>

            <div class="login-field">
                <label for="password">Password</label>
                <input type="password" class="input" id="password" autocomplete="current-password" placeholder="Enter your password">
            </div>

            <div id="errorAlert" class="login-alert" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span id="errorText"></span>
            </div>

            <button type="submit" class="btn primary" id="loginBtn" style="width:100%;justify-content:center;">
                <span id="loginText">Sign in</span>
                <span id="loginSpinner" style="display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.45);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;"></span>
            </button>
        </form>

        <div class="login-foot"><i class="bi bi-shield-lock"></i> Secured institutional access</div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorAlert = document.getElementById('errorAlert');
        const errorText = document.getElementById('errorText');
        const loginBtn = document.getElementById('loginBtn');
        const loginText = document.getElementById('loginText');
        const loginSpinner = document.getElementById('loginSpinner');

        function showError(msg) { errorText.textContent = msg; errorAlert.classList.add('show'); }
        function setLoading(on) {
            loginBtn.disabled = on;
            loginText.style.display = on ? 'none' : '';
            loginSpinner.style.display = on ? '' : 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            errorAlert.classList.remove('show');
            if (!username || !password) { showError('Please enter both username and password.'); return; }
            setLoading(true);
            try {
                const response = await fetch('/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) { window.location.href = '/panel'; }
                else { showError(data.error || 'Invalid credentials'); setLoading(false); }
            } catch (error) { showError('Connection error. Please try again.'); setLoading(false); }
        });
    </script>
</body>
</html>
