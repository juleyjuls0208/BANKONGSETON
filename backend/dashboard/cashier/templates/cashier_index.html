<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier - Bangko ng Seton</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        .header { background: #667eea; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header h1 { font-size: 24px; }
        .header-right { display: flex; gap: 16px; align-items: center; }
        .arduino-status { display: flex; gap: 8px; align-items: center; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 8px; }
        .status-indicator { width: 12px; height: 12px; border-radius: 50%; }
        .status-connected { background: #27ae60; }
        .status-disconnected { background: #e74c3c; }
        .port-selector { padding: 6px 12px; border-radius: 4px; border: none; }
        .connect-btn { background: rgba(255,255,255,0.3); border: 2px solid white; color: white; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .wifi-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin-left: 8px; letter-spacing: 0.03em; }
        .wifi-badge.online { background: #27ae60; color: #fff; }
        .wifi-badge.offline { background: #e74c3c; color: #fff; }
        .logout-btn { background: rgba(255,255,255,0.2); border: 2px solid white; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .main-container { display: grid; grid-template-columns: 1fr 400px; gap: 24px; padding: 24px; height: calc(100vh - 72px); }
        .products-section { background: white; border-radius: 12px; padding: 24px; overflow-y: auto; }
        .search-bar { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; margin-bottom: 20px; font-size: 16px; }
        .categories { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .category-btn { padding: 8px 16px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 20px; cursor: pointer; font-weight: 500; }
        .category-btn.active { background: #667eea; color: white; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
        .product-card { border: 2px solid #e0e0e0; border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.3s; position: relative; }
        .product-card:hover { border-color: #667eea; transform: translateY(-4px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2); }
        .product-name { font-weight: 600; margin-bottom: 8px; }
        .product-price { color: #667eea; font-size: 18px; font-weight: 700; }
        .quick-pay-btn { display: block; width: 100%; margin-top: 10px; padding: 6px; border: none; border-radius: 8px; background: #10b981; color: white; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .quick-pay-btn:hover { background: #059669; }
        .no-products { text-align: center; padding: 40px; color: #999; }
        .cart-section { background: white; border-radius: 12px; padding: 24px; display: flex; flex-direction: column; }
        .cart-header { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .cart-items { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #e0e0e0; }
        .cart-item-name { flex: 1; }
        .cart-item-qty { display: flex; gap: 8px; align-items: center; }
        .qty-btn { width: 28px; height: 28px; border: none; background: #667eea; color: white; border-radius: 4px; cursor: pointer; font-weight: 700; }
        .remove-btn { background: #e74c3c; color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
        .cart-total { font-size: 24px; font-weight: 700; text-align: right; margin-bottom: 16px; color: #667eea; }
        .checkout-btn { width: 100%; padding: 16px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: 700; cursor: pointer; }
        .checkout-btn:disabled { background: #ccc; cursor: not-allowed; }
        .qr-btn { width: 100%; padding: 16px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
        .qr-btn:disabled { background: #ccc; cursor: not-allowed; }
        .clear-btn { width: 100%; padding: 12px; background: #e74c3c; color: white; border: none; border-radius: 8px; margin-bottom: 12px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 40px; border-radius: 16px; text-align: center; max-width: 400px; }
        .modal-content h2 { margin-bottom: 20px; color: #667eea; }
        .modal-content button { margin-top: 20px; padding: 12px 32px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Bangko ng Seton - Cashier</h1>
        <div class="header-right">
            <div class="arduino-status">
                <div class="status-indicator status-disconnected" id="statusIndicator"></div>
                <select class="port-selector" id="portSelector">
                    <option value="">Select COM Port</option>
                </select>
                <button class="connect-btn" onclick="connectArduino()">Connect</button>
                <span class="wifi-badge offline" id="wifiBadge">WiFi</span>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main-container">
        <div id="offlineBanner" style="display:none; background:#fff3cd; color:#856404; padding:8px 16px; font-size:0.875rem; border-bottom:1px solid #ffc107; text-align:center;"></div>
        <div class="products-section">
            <input type="text" class="search-bar" id="searchBar" placeholder="Search products...">

            <div class="categories" id="categories"></div>

            <div class="products-grid" id="productsGrid">
                <div class="no-products">Loading products...</div>
            </div>
        </div>

        <div class="cart-section">
            <div class="cart-header">Cart</div>
            <div class="cart-items" id="cartItems">
                <p style="text-align: center; color: #999;">Cart is empty</p>
            </div>
            <div class="cart-total" id="cartTotal">Total: &#8369;0.00</div>
            <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
            <button class="qr-btn" id="qrBtn" onclick="qrCheckout()" disabled>&#x1F4F1; QR Pay</button>
            <button class="checkout-btn" id="checkoutBtn" onclick="checkout()" disabled>&#x1F4B3; Tap Card</button>
        </div>
    </div>

    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <h2 id="modalTitle">Tap Student Card</h2>
            <p id="modalMessage">Waiting for card...</p>
            <button onclick="closeModal()" style="background: #e74c3c;">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        let products = [];
        let cart = [];
        let selectedCategory = 'All';
        let socket = null;
        let arduinoConnected = false;
        let saleInProgress = false;  // true while waiting for card tap or QR scan

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadPorts();
            loadProducts();
            fetchArduinoWifiStatus();
            initWebSocket();
        });

        // --- Arduino / Port Management ---

        async function loadPorts() {
            try {
                const response = await fetch('/cashier/api/ports');
                const data = await response.json();
                const selector = document.getElementById('portSelector');
                selector.innerHTML = '<option value="">Select COM Port</option>';
                data.ports.forEach(port => {
                    const option = document.createElement('option');
                    option.value = port;
                    option.textContent = port;
                    selector.appendChild(option);
                });
            } catch (error) {
                console.error('Failed to load ports:', error);
            }
        }

        async function connectArduino() {
            const port = document.getElementById('portSelector').value;
            if (!port) {
                alert('Please select a COM port');
                return;
            }

            try {
                const response = await fetch('/cashier/api/connect-arduino', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({port: port})
                });
                const data = await response.json();
                if (data.success) {
                    updateArduinoStatus(true);
                    alert('Arduino connected successfully!');
                } else {
                    alert('Failed to connect: ' + data.error);
                }
            } catch (error) {
                alert('Connection error: ' + error.message);
            }
        }

        function updateArduinoStatus(connected) {
            arduinoConnected = connected;
            const indicator = document.getElementById('statusIndicator');
            indicator.className = 'status-indicator ' + (connected ? 'status-connected' : 'status-disconnected');
        }

        function updateWifiBadge(data) {
            var badge = document.getElementById('wifiBadge');
            if (data.online) {
                arduinoConnected = true;
                badge.className = 'wifi-badge online';
            } else {
                // Only clear arduinoConnected if serial is also disconnected
                if (!document.getElementById('statusIndicator').classList.contains('status-connected')) {
                    arduinoConnected = false;
                }
                badge.className = 'wifi-badge offline';
            }
        }

        async function fetchArduinoWifiStatus() {
            try {
                var token = localStorage.getItem('cashier_token');
                var resp = await fetch('/cashier/api/arduino-wifi-status', {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                if (resp.ok) {
                    var data = await resp.json();
                    updateWifiBadge(data);
                }
            } catch (e) {
                // Network error — badge stays offline (correct)
            }
        }

        // --- Products ---

        async function loadProducts() {
            try {
                const response = await fetch('/cashier/api/products');
                if (!response.ok) {
                    throw new Error('Server returned ' + response.status);
                }
                const data = await response.json();

                if (data.products && data.products.length > 0) {
                    products = data.products.filter(p => p.active);

                    const categories = ['All', ...new Set(products.map(p => p.category))];
                    document.getElementById('categories').innerHTML = categories.map(cat =>
                        `<button class="category-btn ${cat === selectedCategory ? 'active' : ''}" onclick="filterByCategory('${cat}')">${cat}</button>`
                    ).join('');

                    renderProducts();
                } else {
                    document.getElementById('productsGrid').innerHTML = '<div class="no-products">No products available. Please add products in admin dashboard.</div>';
                }
            } catch (error) {
                console.error('Failed to load products:', error);
                document.getElementById('productsGrid').innerHTML = '<div class="no-products">Error loading products. Check console for details.</div>';
            }
        }

        function filterByCategory(category) {
            selectedCategory = category;
            // Re-render categories to update active state
            const categories = ['All', ...new Set(products.map(p => p.category))];
            document.getElementById('categories').innerHTML = categories.map(cat =>
                `<button class="category-btn ${cat === selectedCategory ? 'active' : ''}" onclick="filterByCategory('${cat}')">${cat}</button>`
            ).join('');
            renderProducts();
        }

        function renderProducts() {
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();

            let filtered = products.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(searchTerm);
                const matchesCategory = selectedCategory === 'All' || p.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            const grid = document.getElementById('productsGrid');
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-products">No products found</div>';
            } else {
                grid.innerHTML = filtered.map(p => `
                    <div class="product-card" onclick="addToCart('${p.id}', '${p.name}', ${p.price})">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">&#8369;${p.price.toFixed(2)}</div>
                        <button class="quick-pay-btn" onclick="event.stopPropagation(); quickPay('${p.id}', '${p.name}', ${p.price})" title="Quick Pay — scan card immediately">
                            &#9889; Quick Pay
                        </button>
                    </div>
                `).join('');
            }
        }

        // --- Cart Management ---

        function addToCart(id, name, price) {
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ id, name, price, qty: 1 });
            }
            renderCart();
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
            }
            renderCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            renderCart();
        }

        function renderCart() {
            if (cart.length === 0) {
                document.getElementById('cartItems').innerHTML = '<p style="text-align: center; color: #999;">Cart is empty</p>';
                document.getElementById('checkoutBtn').disabled = true;
                document.getElementById('qrBtn').disabled = true;
            } else {
                document.getElementById('cartItems').innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-qty">
                            <button class="qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
                            <button class="remove-btn" onclick="removeFromCart('${item.id}')">x</button>
                        </div>
                        <div>&#8369;${(item.price * item.qty).toFixed(2)}</div>
                    </div>
                `).join('');
                document.getElementById('checkoutBtn').disabled = false;
                document.getElementById('qrBtn').disabled = false;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('cartTotal').textContent = `Total: \u20B1${total.toFixed(2)}`;
        }

        function clearCart() {
            if (confirm('Clear all items from cart?')) {
                cart = [];
                renderCart();
            }
        }

        // --- WebSocket / Card Reading ---

        function initWebSocket() {
            socket = io();

            socket.on('card_read', function(data) {
                if (!saleInProgress) return;  // stale tap after cancel
                completeSale(data.uid);
            });

            socket.on('card_timeout', function() {
                document.getElementById('modalTitle').textContent = 'Timeout';
                document.getElementById('modalMessage').textContent = 'No card detected. Please try again.';
            });

            socket.on('card_error', function(data) {
                document.getElementById('modalTitle').textContent = 'Error';
                document.getElementById('modalMessage').textContent = data.error;
            });

            socket.on('nfc_payment', function(data) {
                completeNFCSale(data.token);
            });

            socket.on('qr_payment', function(data) {
                if (!saleInProgress) return;  // stale payment after cancel
                saleInProgress = false;
                document.getElementById('paymentModal').style.display = 'flex';
                document.getElementById('modalTitle').textContent = 'QR Payment Received!';
                document.getElementById('modalMessage').textContent =
                    'New Balance: \u20B1' + data.new_balance.toFixed(2);
                cart = [];
                renderCart();
                checkQueueStatus();
                setTimeout(function() { closeModal(); }, 2000);
            });

            socket.on('sale_cancelled', function() {
                saleInProgress = false;
            });
                updateWifiBadge(data);
            });
        }

        // --- Checkout / Payment ---

        async function qrCheckout() {
            if (cart.length === 0) return;

            const items = cart.map(item => ({name: item.name, price: item.price, qty: item.qty}));
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            document.getElementById('paymentModal').style.display = 'flex';
            document.getElementById('modalTitle').textContent = '\uD83D\uDCF1 QR Pay';
            document.getElementById('modalMessage').textContent = 'Generating QR code\u2026';
            saleInProgress = true;

            try {
                const response = await fetch('/cashier/api/qr-generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({items, total})
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error || 'Failed to generate QR (' + response.status + ')');
                }

                const data = await response.json();
                const token = data.token;

                document.getElementById('modalTitle').textContent = '\uD83D\uDCF1 Scan QR on OLED';
                document.getElementById('modalMessage').textContent =
                    'QR code shown on the reader display.\nAsk student to scan with their app.\nTotal: \u20B1' + total.toFixed(2);

                // Poll PythonAnywhere (via local proxy) every second for payment confirmation
                const pollInterval = setInterval(async function() {
                    if (!saleInProgress) { clearInterval(pollInterval); return; }
                    try {
                        const pr = await fetch('/api/cashier/qr-paid', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({token: token})
                        });
                        if (!pr.ok) return;
                        const pd = await pr.json();
                        if (pd.paid) {
                            clearInterval(pollInterval);
                            saleInProgress = false;
                            document.getElementById('modalTitle').textContent = '\u2705 Payment Received!';
                            document.getElementById('modalMessage').textContent =
                                'New Balance: \u20B1' + pd.new_balance.toFixed(2);
                            cart = [];
                            renderCart();
                            checkQueueStatus();
                            setTimeout(function() { closeModal(); }, 2000);
                        }
                    } catch(e) { /* network blip — keep polling */ }
                }, 1000);

            } catch (error) {
                saleInProgress = false;
                document.getElementById('modalTitle').textContent = 'QR Error';
                document.getElementById('modalMessage').textContent = error.message;
            }
        }

        async function checkout() {
            if (!arduinoConnected) {
                alert('Arduino not connected — check COM port or WiFi.');
                return;
            }

            if (cart.length === 0) return;

            const items = cart.map(item => ({
                name: item.name,
                price: item.price,
                qty: item.qty
            }));

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            // Show modal
            document.getElementById('paymentModal').style.display = 'flex';
            document.getElementById('modalTitle').textContent = 'Tap Student Card';
            document.getElementById('modalMessage').textContent = 'Waiting for card...';
            saleInProgress = true;

            try {
                const response = await fetch('/cashier/api/process-sale', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({items, total})
                });

                if (!response.ok) {
                    throw new Error('Failed to initiate sale');
                }
            } catch (error) {
                closeModal();
                alert('Error: ' + error.message);
            }
        }

        async function completeSale(cardUid) {
            try {
                const response = await fetch('/cashier/api/complete-sale', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({card_uid: cardUid})
                });

                const data = await response.json();

                if (data.error) {
                    saleInProgress = false;
                    document.getElementById('modalTitle').textContent = 'Payment Failed';
                    document.getElementById('modalMessage').textContent = data.error;
                } else {
                    saleInProgress = false;
                    const offlineNote = data.offline ? ' (Offline — will sync)' : '';
                    document.getElementById('modalTitle').textContent = 'Success!';
                    document.getElementById('modalMessage').textContent =
                        'Payment received!\nNew Balance: \u20B1' + data.new_balance.toFixed(2) + offlineNote;

                    cart = [];
                    renderCart();
                    checkQueueStatus();

                    setTimeout(function() { closeModal(); }, 2000);
                }
            } catch (error) {
                document.getElementById('modalTitle').textContent = 'Error';
                document.getElementById('modalMessage').textContent = error.message;
            }
        }

        async function completeNFCSale(token) {
            // Ensure modal is visible — NFC tap may arrive before cashier opens checkout
            var modal = document.getElementById('paymentModal');
            if (modal.style.display !== 'flex') {
                modal.style.display = 'flex';
                document.getElementById('modalTitle').textContent = 'NFC Payment';
                document.getElementById('modalMessage').textContent = 'Processing phone tap...';
            }
            try {
                const response = await fetch('/cashier/api/complete-sale-nfc', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({virtual_card_token: token})
                });
                const data = await response.json();
                if (data.error) {
                    document.getElementById('modalTitle').textContent = 'Payment Failed';
                    document.getElementById('modalMessage').textContent = data.error;
                } else {
                    const offlineNote = data.offline ? ' (Offline \u2014 will sync)' : '';
                    document.getElementById('modalTitle').textContent = 'Success!';
                    document.getElementById('modalMessage').textContent =
                        'NFC Payment received!\nNew Balance: \u20B1' + data.new_balance.toFixed(2) + offlineNote;
                    cart = [];
                    renderCart();
                    checkQueueStatus();
                    setTimeout(function() { closeModal(); }, 2000);
                }
            } catch (error) {
                document.getElementById('modalTitle').textContent = 'Error';
                document.getElementById('modalMessage').textContent = error.message;
            }
        }

        // --- Modal / Auth ---

        function closeModal() {
            saleInProgress = false;
            document.getElementById('paymentModal').style.display = 'none';
            // Tell the server to clear pending QR + session so Arduino returns to Ready
            fetch('/cashier/api/cancel-sale', {method: 'POST'}).catch(function() {});
        }

        function logout() {
            fetch('/cashier/api/logout', {method: 'POST'})
                .then(function() { window.location.href = '/cashier/login'; });
        }

        // --- Event Listeners ---

        document.getElementById('searchBar').addEventListener('input', renderProducts);

        // --- Quick Pay ---

        function quickPay(productId, productName, price) {
            if (!arduinoConnected) {
                alert('Arduino not connected — check COM port or WiFi.');
                return;
            }
            const items = [{name: productName, price: price, qty: 1}];
            const total = price;
            document.getElementById('paymentModal').style.display = 'flex';
            document.getElementById('modalTitle').textContent = 'Quick Pay — Tap Card';
            document.getElementById('modalMessage').textContent = productName + ' — \u20B1' + price.toFixed(2);
            fetch('/cashier/api/process-sale', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({items, total})
            }).catch(function(err) {
                closeModal();
                alert('Error: ' + err.message);
            });
        }

        // --- Offline Queue Status ---

        async function checkQueueStatus() {
            try {
                const res = await fetch('/cashier/api/queue/status');
                if (!res.ok) return;
                const data = await res.json();
                const banner = document.getElementById('offlineBanner');
                if (banner) {
                    if (data.pending > 0) {
                        banner.style.display = 'block';
                        banner.textContent = '\u26A0\uFE0F ' + data.pending + ' transaction(s) pending sync. Working offline.';
                    } else {
                        banner.style.display = 'none';
                    }
                }
            } catch {}
        }

        // Check queue status on load and every 30s
        checkQueueStatus();
        setInterval(checkQueueStatus, 30000);
    </script>
</body>
</html>
