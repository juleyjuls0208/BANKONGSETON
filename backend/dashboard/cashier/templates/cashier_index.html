<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier - Bangko ng Seton</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        .header { background: #667eea; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header h1 { font-size: 24px; }
        .header-right { display: flex; gap: 16px; align-items: center; }
        .arduino-status { display: flex; gap: 8px; align-items: center; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 8px; }
        .status-indicator { width: 12px; height: 12px; border-radius: 50%; }
        .status-connected { background: #27ae60; }
        .status-disconnected { background: #e74c3c; }
        .port-selector { padding: 6px 12px; border-radius: 4px; border: none; }
        .connect-btn { background: rgba(255,255,255,0.3); border: 2px solid white; color: white; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .logout-btn { background: rgba(255,255,255,0.2); border: 2px solid white; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .main-container { display: grid; grid-template-columns: 1fr 400px; gap: 24px; padding: 24px; height: calc(100vh - 72px); }
        .products-section { background: white; border-radius: 12px; padding: 24px; overflow-y: auto; }
        .search-bar { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; margin-bottom: 20px; font-size: 16px; }
        .categories { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .category-btn { padding: 8px 16px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 20px; cursor: pointer; font-weight: 500; }
        .category-btn.active { background: #667eea; color: white; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
        .product-card { border: 2px solid #e0e0e0; border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .product-card:hover { border-color: #667eea; transform: translateY(-4px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2); }
        .product-name { font-weight: 600; margin-bottom: 8px; }
        .product-price { color: #667eea; font-size: 18px; font-weight: 700; }
        .no-products { text-align: center; padding: 40px; color: #999; }
        .cart-section { background: white; border-radius: 12px; padding: 24px; display: flex; flex-direction: column; }
        .cart-header { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .cart-items { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #e0e0e0; }
        .cart-item-name { flex: 1; }
        .cart-item-qty { display: flex; gap: 8px; align-items: center; }
        .qty-btn { width: 28px; height: 28px; border: none; background: #667eea; color: white; border-radius: 4px; cursor: pointer; font-weight: 700; }
        .remove-btn { background: #e74c3c; color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
        .cart-total { font-size: 24px; font-weight: 700; text-align: right; margin-bottom: 16px; color: #667eea; }
        .checkout-btn { width: 100%; padding: 16px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: 700; cursor: pointer; }
        .checkout-btn:disabled { background: #ccc; cursor: not-allowed; }
        .clear-btn { width: 100%; padding: 12px; background: #e74c3c; color: white; border: none; border-radius: 8px; margin-bottom: 12px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 40px; border-radius: 16px; text-align: center; max-width: 400px; }
        .modal-content h2 { margin-bottom: 20px; color: #667eea; }
        .modal-content button { margin-top: 20px; padding: 12px 32px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Bangko ng Seton - Cashier</h1>
        <div class="header-right">
            <div class="arduino-status">
                <div class="status-indicator status-disconnected" id="statusIndicator"></div>
                <select class="port-selector" id="portSelector">
                    <option value="">Select COM Port</option>
                </select>
                <button class="connect-btn" id="connectBtn" onclick="connectArduino()">Connect</button>
                <span id="manual-mode-badge" style="display:none; background:#e67e22; color:white; padding:4px 10px; border-radius:12px; font-size:12px; font-weight:600;">Manual Mode</span>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main-container">
        <div class="products-section">
            <input type="text" class="search-bar" id="searchBar" placeholder="Search products...">

            <div class="categories" id="categories"></div>

            <div class="products-grid" id="productsGrid">
                <div class="no-products">Loading products...</div>
            </div>
        </div>

        <div class="cart-section">
            <div class="cart-header">Cart</div>
            <div class="cart-items" id="cartItems">
                <p style="text-align: center; color: #999;">Cart is empty</p>
            </div>
            <div class="cart-total" id="cartTotal">Total: &#8369;0.00</div>
            <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
            <button class="checkout-btn" id="checkoutBtn" onclick="checkout()" disabled>Pay Now</button>
            <div id="result" style="margin-top:12px;min-height:24px;"></div>
        </div>
    </div>

    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <h2 id="modalTitle">Tap Student Card</h2>
            <p id="modalMessage">Waiting for card...</p>
            <button onclick="closeModal()" style="background: #e74c3c;">Cancel</button>
        </div>
    </div>

    <!-- Manual Student Lookup Modal -->
    <div id="manualLookupModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
      <div style="background:white; border-radius:12px; padding:24px; width:90%; max-width:400px; box-shadow:0 4px 20px rgba(0,0,0,0.3);">
        <h3 style="margin-bottom:16px;">Find Student</h3>
        <input type="text" id="studentSearchInput" placeholder="Type student name or ID..." oninput="searchStudents()"
          style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; font-size:15px; margin-bottom:12px; box-sizing:border-box;">
        <div id="studentSearchResults" style="max-height:200px; overflow-y:auto; margin-bottom:12px;"></div>
        <button onclick="closeManualModal()" style="width:100%; padding:10px; background:#ccc; border:none; border-radius:6px; cursor:pointer; font-size:14px;">Cancel</button>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        let products = [];
        let cart = [];
        let selectedCategory = 'All';
        let socket = null;
        let arduinoConnected = false;
        window.manualMode = false;
        window.selectedStudent = null;

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadPorts().then(function() {
                if (!window.manualMode) {
                    initWebSocket();
                }
                loadProducts();
            });
        });

        // --- Arduino / Port Management ---

        async function loadPorts() {
            try {
                const response = await fetch('/cashier/api/ports');
                const data = await response.json();
                const ports = data.ports || [];
                if (ports.length > 0) {
                    const selector = document.getElementById('portSelector');
                    selector.innerHTML = '<option value="">Select COM Port</option>';
                    ports.forEach(port => {
                        const option = document.createElement('option');
                        option.value = port;
                        option.textContent = port;
                        selector.appendChild(option);
                    });
                } else {
                    enterManualMode();
                }
            } catch (error) {
                console.error('Failed to load ports:', error);
                enterManualMode();
            }
        }

        function enterManualMode() {
            window.manualMode = true;
            // Hide port selector and connect button
            var portSelector = document.getElementById('portSelector');
            if (portSelector) portSelector.style.display = 'none';
            var connectBtn = document.getElementById('connectBtn');
            if (connectBtn) connectBtn.style.display = 'none';
            // Show manual mode badge
            var badge = document.getElementById('manual-mode-badge');
            if (badge) badge.style.display = 'inline-block';
            // Enable checkout button immediately (no Arduino needed)
            var checkoutBtn = document.getElementById('checkoutBtn');
            if (checkoutBtn) checkoutBtn.disabled = false;
        }

        async function connectArduino() {
            const port = document.getElementById('portSelector').value;
            if (!port) {
                alert('Please select a COM port');
                return;
            }

            try {
                const response = await fetch('/cashier/api/connect-arduino', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({port: port})
                });
                const data = await response.json();
                if (data.success) {
                    updateArduinoStatus(true);
                    alert('Arduino connected successfully!');
                } else {
                    alert('Failed to connect: ' + data.error);
                }
            } catch (error) {
                alert('Connection error: ' + error.message);
            }
        }

        function updateArduinoStatus(connected) {
            arduinoConnected = connected;
            const indicator = document.getElementById('statusIndicator');
            indicator.className = 'status-indicator ' + (connected ? 'status-connected' : 'status-disconnected');
        }

        // --- Products ---

        async function loadProducts() {
            try {
                const response = await fetch('/cashier/api/products');
                if (!response.ok) {
                    throw new Error('Server returned ' + response.status);
                }
                const data = await response.json();

                if (data.products && data.products.length > 0) {
                    products = data.products.filter(p => p.active);

                    const categories = ['All', ...new Set(products.map(p => p.category))];
                    document.getElementById('categories').innerHTML = categories.map(cat =>
                        `<button class="category-btn ${cat === selectedCategory ? 'active' : ''}" onclick="filterByCategory('${cat}')">${cat}</button>`
                    ).join('');

                    renderProducts();
                } else {
                    document.getElementById('productsGrid').innerHTML = '<div class="no-products">No products available. Please add products in admin dashboard.</div>';
                }
            } catch (error) {
                console.error('Failed to load products:', error);
                document.getElementById('productsGrid').innerHTML = '<div class="no-products">Error loading products. Check console for details.</div>';
            }
        }

        function filterByCategory(category) {
            selectedCategory = category;
            // Re-render categories to update active state
            const categories = ['All', ...new Set(products.map(p => p.category))];
            document.getElementById('categories').innerHTML = categories.map(cat =>
                `<button class="category-btn ${cat === selectedCategory ? 'active' : ''}" onclick="filterByCategory('${cat}')">${cat}</button>`
            ).join('');
            renderProducts();
        }

        function renderProducts() {
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();

            let filtered = products.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(searchTerm);
                const matchesCategory = selectedCategory === 'All' || p.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            const grid = document.getElementById('productsGrid');
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-products">No products found</div>';
            } else {
                grid.innerHTML = filtered.map(p => `
                    <div class="product-card" onclick="addToCart('${p.id}', '${p.name}', ${p.price})">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">&#8369;${p.price.toFixed(2)}</div>
                    </div>
                `).join('');
            }
        }

        // --- Cart Management ---

        function addToCart(id, name, price) {
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ id, name, price, qty: 1 });
            }
            renderCart();
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
            }
            renderCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            renderCart();
        }

        function renderCart() {
            if (cart.length === 0) {
                document.getElementById('cartItems').innerHTML = '<p style="text-align: center; color: #999;">Cart is empty</p>';
                // Only disable if not in manual mode (manual mode keeps it enabled when cart is empty too)
                if (!window.manualMode) {
                    document.getElementById('checkoutBtn').disabled = true;
                }
            } else {
                document.getElementById('cartItems').innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-qty">
                            <button class="qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
                            <button class="remove-btn" onclick="removeFromCart('${item.id}')">x</button>
                        </div>
                        <div>&#8369;${(item.price * item.qty).toFixed(2)}</div>
                    </div>
                `).join('');
                document.getElementById('checkoutBtn').disabled = false;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('cartTotal').textContent = `Total: \u20B1${total.toFixed(2)}`;
        }

        function clearCart() {
            if (confirm('Clear all items from cart?')) {
                cart = [];
                renderCart();
            }
        }

        // --- WebSocket / Card Reading ---

        function initWebSocket() {
            socket = io();

            socket.on('cashier_request_card', function(data) {
                socket.emit('cashier_request_card', data);
            });

            socket.on('card_read', function(data) {
                completeSale(data.uid);
            });

            socket.on('nfc_payment', function(data) {
                // Phone tapped — show blue NFC modal while payment is processing
                var modal = document.getElementById('paymentModal');
                var title = document.getElementById('modalTitle');
                var msg   = document.getElementById('modalMessage');
                modal.style.background = '#2196F3';
                title.textContent = 'NFC Payment';
                msg.textContent   = 'Processing payment...';
                modal.style.display = 'flex';
            });

            socket.on('nfc_payment_result', function(data) {
                // Close the modal
                closeModal();
                var resultDiv = document.getElementById('result');
                if (data.success) {
                    resultDiv.innerHTML =
                        '<div style="color:#43A047;font-size:1.2em;">&#10003; NFC Payment Approved</div>';
                } else {
                    var errMsg = data.error || 'Unknown error';
                    resultDiv.innerHTML =
                        '<div style="color:#e53935;font-size:1.1em;">&#10007; NFC Payment Failed: ' +
                        errMsg +
                        '</div>' +
                        '<button onclick="retryNfcPayment()" ' +
                        'style="margin-top:8px;padding:8px 20px;background:#2196F3;color:#fff;' +
                        'border:none;border-radius:4px;cursor:pointer;">Retry NFC</button>';
                }
            });

            socket.on('card_timeout', function() {
                document.getElementById('modalTitle').textContent = 'Timeout';
                document.getElementById('modalMessage').textContent = 'No card detected. Please try again.';
            });

            socket.on('card_error', function(data) {
                document.getElementById('modalTitle').textContent = 'Error';
                document.getElementById('modalMessage').textContent = data.error;
            });
        }

        // --- Checkout / Payment ---

        async function checkout() {
            if (cart.length === 0) return;

            if (window.manualMode) {
                openManualLookupModal();
                return;
            }

            // Arduino connection is required for card reading; this guard is intentional
            if (!arduinoConnected) {
                alert('Arduino not connected! Please connect to a COM port first.');
                return;
            }

            const items = cart.map(item => ({
                name: item.name,
                price: item.price,
                qty: item.qty
            }));

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            // Show modal (RFID — green)
            document.getElementById('paymentModal').style.background = '#43A047';
            document.getElementById('paymentModal').style.display = 'flex';
            document.getElementById('modalTitle').textContent = 'Tap Student Card';
            document.getElementById('modalMessage').textContent = 'Waiting for card...';

            try {
                const response = await fetch('/cashier/api/process-sale', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({items, total})
                });

                if (!response.ok) {
                    throw new Error('Failed to initiate sale');
                }
            } catch (error) {
                closeModal();
                alert('Error: ' + error.message);
            }
        }

        async function completeSale(cardUid) {
            try {
                const response = await fetch('/cashier/api/complete-sale', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({card_uid: cardUid})
                });

                const data = await response.json();

                if (data.error) {
                    document.getElementById('modalTitle').textContent = 'Payment Failed';
                    document.getElementById('modalMessage').textContent = data.error;
                } else {
                    document.getElementById('modalTitle').textContent = 'Success!';
                    document.getElementById('modalMessage').textContent =
                        'Payment received!\nNew Balance: \u20B1' + data.new_balance.toFixed(2);

                    cart = [];
                    renderCart();

                    setTimeout(function() { closeModal(); }, 2000);
                }
            } catch (error) {
                document.getElementById('modalTitle').textContent = 'Error';
                document.getElementById('modalMessage').textContent = error.message;
            }
        }

        // --- Manual Mode Helpers ---

        function openManualLookupModal() {
            window.selectedStudent = null;
            document.getElementById('studentSearchInput').value = '';
            document.getElementById('studentSearchResults').innerHTML = '';
            document.getElementById('manualLookupModal').style.display = 'flex';
            document.getElementById('studentSearchInput').focus();
        }

        function closeManualModal() {
            document.getElementById('manualLookupModal').style.display = 'none';
        }

        async function searchStudents() {
            const q = document.getElementById('studentSearchInput').value.trim();
            if (q.length < 2) {
                document.getElementById('studentSearchResults').innerHTML = '';
                return;
            }
            try {
                const response = await fetch('/cashier/api/lookup-student?q=' + encodeURIComponent(q));
                const data = await response.json();
                const resultsDiv = document.getElementById('studentSearchResults');
                if (!data.students || data.students.length === 0) {
                    resultsDiv.innerHTML = '<p style="color:#999; padding:8px;">No students found</p>';
                    return;
                }
                resultsDiv.innerHTML = data.students.map(function(s) {
                    return '<div onclick="selectStudentAndPay(\'' + s.id + '\',\'' + s.name.replace(/'/g, "\\'") + '\',' + s.balance + ')"' +
                      ' style="padding:10px; border:1px solid #eee; border-radius:6px; margin-bottom:6px; cursor:pointer; transition:background 0.15s;"' +
                      ' onmouseover="this.style.background=\'#f0f0f0\'" onmouseout="this.style.background=\'white\'">' +
                      '<strong>' + s.name + '</strong> <span style="color:#888; font-size:13px;">(' + s.id + ')</span><br>' +
                      '<span style="color:#27ae60;">Balance: \u0E3F' + s.balance.toFixed(2) + '</span>' +
                      '</div>';
                }).join('');
            } catch (error) {
                console.error('Search failed:', error);
            }
        }

        async function selectStudentAndPay(studentId, studentName, studentBalance) {
            closeManualModal();
            const total = cart.reduce(function(sum, item) { return sum + (item.price * item.qty); }, 0);
            if (studentBalance < total) {
                alert('Insufficient funds. Balance: \u0E3F' + studentBalance.toFixed(2) + ', Required: \u0E3F' + total.toFixed(2));
                return;
            }

            // Show payment modal
            document.getElementById('paymentModal').style.display = 'flex';
            document.getElementById('modalTitle').textContent = 'Processing...';
            document.getElementById('modalMessage').textContent = 'Charging ' + studentName + '...';

            try {
                var items = cart.map(function(item) { return {name: item.name, price: item.price, qty: item.qty}; });

                // Step 1: Store pending transaction in session via process-sale
                var processResponse = await fetch('/cashier/api/process-sale', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({items: items, total: total})
                });
                if (!processResponse.ok) {
                    var processData = await processResponse.json();
                    throw new Error(processData.error || 'Failed to initiate sale');
                }

                // Step 2: Complete sale with manual_student_id
                var response = await fetch('/cashier/api/complete-sale', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({manual_student_id: studentId})
                });
                var data = await response.json();
                if (data.error) {
                    document.getElementById('modalTitle').textContent = 'Payment Failed';
                    document.getElementById('modalMessage').textContent = data.error;
                } else {
                    document.getElementById('modalTitle').textContent = 'Success!';
                    document.getElementById('modalMessage').textContent =
                        'Payment received!\nNew Balance: \u20B1' + data.new_balance.toFixed(2);
                    cart = [];
                    renderCart();
                    setTimeout(function() { closeModal(); }, 2000);
                }
            } catch (error) {
                document.getElementById('modalTitle').textContent = 'Error';
                document.getElementById('modalMessage').textContent = error.message;
            }
        }

        // --- Modal / Auth ---

        function closeModal() {
            document.getElementById('paymentModal').style.display = 'none';
        }

        function retryNfcPayment() {
            // Re-show the NFC waiting modal so cashier can ask student to tap again
            var modal = document.getElementById('paymentModal');
            var title = document.getElementById('modalTitle');
            var msg   = document.getElementById('modalMessage');
            modal.style.background = '#2196F3';
            title.textContent = 'NFC Payment';
            msg.textContent   = 'Tap phone again...';
            modal.style.display = 'flex';
            document.getElementById('result').innerHTML = '';
        }

        function logout() {
            fetch('/cashier/api/logout', {method: 'POST'})
                .then(function() { window.location.href = '/cashier/login'; });
        }

        // --- Event Listeners ---

        document.getElementById('searchBar').addEventListener('input', renderProducts);
    </script>
</body>
</html>
