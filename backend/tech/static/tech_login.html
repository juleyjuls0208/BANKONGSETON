<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tech Kiosk — Login</title>
<style>
  body{margin:0;height:100vh;display:grid;place-items:center;background:#0f1b2d;
    font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#f1f5f9;}
  .box{background:#16263c;border:1px solid #ffffff14;border-radius:16px;padding:32px;width:min(360px,90vw);}
  h2{margin:0 0 18px;text-align:center;}
  input{width:100%;padding:14px;margin:8px 0;border-radius:10px;border:none;background:#0c1726;color:#fff;font-size:16px;}
  button{width:100%;padding:14px;margin-top:14px;border:none;border-radius:10px;background:#ffce47;color:#0f1b2d;font-weight:700;font-size:16px;cursor:pointer;}
  .msg{color:#ef4444;min-height:20px;text-align:center;font-size:14px;}
</style></head>
<body>
<div class="box">
  <h2>🔧 Tech Kiosk Login</h2>
  <input id="u" placeholder="Username" autocomplete="username"/>
  <input id="p" type="password" placeholder="Password" autocomplete="current-password"/>
  <button id="go">Sign In</button>
  <div class="msg" id="msg"></div>
</div>
<script>
const $=id=>document.getElementById(id);
$('go').onclick=async()=>{
  const r=await fetch('/tech/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:$('u').value,password:$('p').value})});
  if(r.ok){ location.href='/tech/'; }
  else { const j=await r.json().catch(()=>({})); $('msg').textContent=j.error||'Login failed'; }
};
</script>
</body></html>
